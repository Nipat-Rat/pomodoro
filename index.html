<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --white: #f5ede0;
    --dim: rgba(245,237,224,0.55);
    --accent: #e8724a;
    --accent2: #f0a855;
    --bg-dark: #1a100a;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-dark);
    font-family: 'Space Mono', monospace;
    overflow: hidden;
    position: relative;
  }

  /* ── GIF background ── */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: url('background_pomodoro.gif') center center / cover no-repeat;
  }

  /* Rain overlay */
  .rain {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }

  .rain span {
    position: absolute;
    top: -20px;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(180,200,255,0.25));
    animation: fall linear infinite;
  }

  @keyframes fall {
    to { transform: translateY(110vh); }
  }

  /* Noise grain */
  .grain {
    position: fixed;
    inset: 0;
    z-index: 2;
    opacity: 0.035;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    animation: grain 0.5s steps(1) infinite;
  }

  @keyframes grain {
    0%,100%{transform:translate(0,0)}
    10%{transform:translate(-1%,-1%)}
    20%{transform:translate(1%,1%)}
    30%{transform:translate(-1%,1%)}
    40%{transform:translate(1%,-1%)}
    50%{transform:translate(-2%,0)}
    60%{transform:translate(2%,0)}
    70%{transform:translate(0,2%)}
    80%{transform:translate(0,-2%)}
    90%{transform:translate(-1%,2%)}
  }

  /* ── Main card ── */
  .card {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2.5rem 3rem 2rem;
    background: rgba(18,10,4,0.58);
    backdrop-filter: blur(16px) saturate(1.2);
    border: 1px solid rgba(245,220,180,0.12);
    border-radius: 6px;
    box-shadow: 0 0 80px rgba(0,0,0,0.6), 0 8px 32px rgba(232,114,74,0.08) inset;
    min-width: 340px;
  }

  /* Mode tabs */
  .tabs {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 2rem;
  }

  .tab {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.35rem 0.9rem;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab:hover { color: var(--white); border-color: rgba(255,255,255,0.35); }

  .tab.active {
    background: var(--white);
    color: #0a0a0f;
    border-color: var(--white);
    font-weight: 700;
  }

  /* Timer display */
  .timer-wrap {
    position: relative;
    margin: 0.5rem 0 1.8rem;
  }

  .timer {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 18vw, 7.5rem);
    line-height: 1;
    color: var(--white);
    letter-spacing: 0.04em;
    text-shadow:
      0 0 40px rgba(255,255,255,0.15),
      0 0 80px rgba(255,60,60,0.12);
    transition: color 0.4s;
    user-select: none;
  }

  .timer.urgent { color: var(--accent); text-shadow: 0 0 40px rgba(255,60,60,0.5); }

  /* Progress ring */
  .ring-wrap {
    position: absolute;
    inset: -14px;
    pointer-events: none;
  }

  .ring-wrap svg {
    width: 100%; height: 100%;
    transform: rotate(-90deg);
  }

  .ring-bg { stroke: rgba(255,255,255,0.05); }
  .ring-fg {
    stroke: var(--white);
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.4s;
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.4));
  }
  .ring-fg.urgent { stroke: var(--accent); filter: drop-shadow(0 0 8px rgba(255,60,60,0.7)); }

  /* Mode label */
  .mode-label {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 1.5rem;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
  }

  .btn-start {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0.7rem 2.2rem;
    border-radius: 999px;
    border: none;
    background: var(--white);
    color: #0a0a0f;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
    box-shadow: 0 0 20px rgba(255,255,255,0.15);
  }

  .btn-start:hover {
    transform: scale(1.04);
    box-shadow: 0 0 30px rgba(255,255,255,0.25);
  }

  .btn-start:active { transform: scale(0.97); }
  .btn-start.running { background: var(--accent); color: #fff; box-shadow: 0 0 20px rgba(255,60,60,0.3); }

  .btn-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    transition: all 0.2s;
  }

  .btn-icon:hover { color: var(--white); border-color: rgba(255,255,255,0.4); }

  /* Session dots */
  .sessions {
    display: flex;
    gap: 0.4rem;
    justify-content: center;
    margin-top: 1.6rem;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: background 0.3s;
  }

  .dot.done { background: var(--white); box-shadow: 0 0 6px rgba(255,255,255,0.5); }
  .dot.current { background: var(--accent); box-shadow: 0 0 6px rgba(255,60,60,0.7); animation: pulse-dot 1s ease-in-out infinite; }

  @keyframes pulse-dot {
    0%,100%{ transform: scale(1); }
    50%{ transform: scale(1.5); }
  }

  /* Settings panel */
  .settings-panel {
    display: none;
    position: absolute;
    bottom: calc(100% + 12px);
    left: 50%; transform: translateX(-50%);
    background: rgba(10,10,16,0.95);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 1rem 1.4rem;
    min-width: 220px;
    z-index: 20;
    text-align: left;
  }

  .settings-panel.open { display: block; }

  .settings-panel h4 {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 0.8rem;
  }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.6rem;
    gap: 1rem;
  }

  .setting-row label {
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.05em;
  }

  .setting-row input[type=number] {
    width: 52px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 4px;
    color: var(--white);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    padding: 0.25rem 0.4rem;
    text-align: center;
  }

  .setting-row input:focus { outline: none; border-color: rgba(255,255,255,0.4); }

  .settings-apply {
    width: 100%;
    margin-top: 0.6rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.35rem;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent;
    color: var(--white);
    cursor: pointer;
    transition: background 0.2s;
  }

  .settings-apply:hover { background: rgba(255,255,255,0.08); }

  /* Neon sign flicker on street */
  @keyframes flicker {
    0%,19%,21%,23%,25%,54%,56%,100%{ opacity:1; }
    20%,22%,24%,55%{ opacity:0.3; }
  }
</style>
</head>

<!-- Warm overlay -->
<div style="position:fixed;inset:0;z-index:1;background:rgba(20,12,5,0.32);pointer-events:none;"></div>

<!-- ── App ── -->
<div class="card">
  <div class="tabs">
    <button class="tab active" data-mode="pomodoro">Pomodoro</button>
    <button class="tab" data-mode="short">Short Break</button>
    <button class="tab" data-mode="long">Long Break</button>
  </div>

  <div class="mode-label" id="modeLabel">Focus Session</div>

  <div class="timer-wrap">
    <svg class="ring-wrap" viewBox="0 0 220 80" style="position:absolute;top:-18px;left:-18px;right:-18px;bottom:-18px;width:calc(100% + 36px);height:calc(100% + 36px);pointer-events:none;">
    </svg>
    <div class="timer" id="timer">25:00</div>
  </div>

  <div class="controls" style="position:relative;">
    <button class="btn-start" id="btnStart">Start</button>
    <button class="btn-icon" id="btnReset" title="Reset">↺</button>
    <div style="position:relative;">
      <button class="btn-icon" id="btnSettings" title="Settings">⚙</button>
      <div class="settings-panel" id="settingsPanel">
        <h4>Timer Settings (min)</h4>
        <div class="setting-row">
          <label>Pomodoro</label>
          <input type="number" id="setPomo" value="25" min="1" max="90"/>
        </div>
        <div class="setting-row">
          <label>Short Break</label>
          <input type="number" id="setShort" value="5" min="1" max="30"/>
        </div>
        <div class="setting-row">
          <label>Long Break</label>
          <input type="number" id="setLong" value="15" min="1" max="60"/>
        </div>
        <button class="settings-apply" id="applySettings">Apply</button>
      </div>
    </div>
  </div>

  <div class="sessions" id="sessions"></div>
</div>

<script>
// ── Audio ──
const ctx = new (window.AudioContext || window.webkitAudioContext)();

function playTick() {
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.frequency.value = 1200;
  o.type = 'sine';
  g.gain.setValueAtTime(0.04, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
  o.start(); o.stop(ctx.currentTime + 0.04);
}

function playAlarm() {
  const notes = [880, 1100, 880, 1100];
  notes.forEach((freq, i) => {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = freq;
    o.type = 'triangle';
    const t = ctx.currentTime + i * 0.25;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.3, t + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    o.start(t); o.stop(t + 0.22);
  });
}

// ── State ──
const MODES = { pomodoro: 25, short: 5, long: 15 };
const LABELS = { pomodoro: 'Focus Session', short: 'Short Break', long: 'Long Break' };
let settings = { pomodoro: 25, short: 5, long: 15 };
let mode = 'pomodoro';
let total = 25 * 60;
let remaining = total;
let running = false;
let interval = null;
let sessions = 0;
const MAX_SESSIONS = 4;

const timerEl = document.getElementById('timer');
const btnStart = document.getElementById('btnStart');
const btnReset = document.getElementById('btnReset');
const btnSettings = document.getElementById('btnSettings');
const settingsPanel = document.getElementById('settingsPanel');
const modeLabel = document.getElementById('modeLabel');
const sessionsEl = document.getElementById('sessions');

function fmt(s) {
  const m = Math.floor(s / 60);
  const ss = s % 60;
  return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

function updateDisplay() {
  timerEl.textContent = fmt(remaining);
  const urgent = remaining <= 60 && running;
  timerEl.classList.toggle('urgent', urgent);
  // Update title
  document.title = `${fmt(remaining)} — Pomodoro`;
}

function renderSessions() {
  sessionsEl.innerHTML = '';
  for (let i = 0; i < MAX_SESSIONS; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < sessions ? ' done' : (i === sessions && running && mode === 'pomodoro' ? ' current' : ''));
    sessionsEl.appendChild(d);
  }
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === m));
  total = settings[m] * 60;
  remaining = total;
  running = false;
  clearInterval(interval);
  btnStart.textContent = 'Start';
  btnStart.classList.remove('running');
  modeLabel.textContent = LABELS[m];
  updateDisplay();
  renderSessions();
}

function toggle() {
  if (ctx.state === 'suspended') ctx.resume();
  running = !running;
  if (running) {
    btnStart.textContent = 'Pause';
    btnStart.classList.add('running');
    interval = setInterval(tick, 1000);
  } else {
    btnStart.textContent = 'Resume';
    btnStart.classList.remove('running');
    clearInterval(interval);
  }
  renderSessions();
}

function tick() {
  playTick();
  remaining--;
  updateDisplay();
  renderSessions();
  if (remaining <= 0) {
    clearInterval(interval);
    running = false;
    btnStart.textContent = 'Start';
    btnStart.classList.remove('running');
    playAlarm();
    if (mode === 'pomodoro') {
      sessions = Math.min(sessions + 1, MAX_SESSIONS);
      if (sessions >= MAX_SESSIONS) sessions = 0;
    }
    remaining = total;
    updateDisplay();
    renderSessions();
  }
}

function reset() {
  clearInterval(interval);
  running = false;
  remaining = total;
  btnStart.textContent = 'Start';
  btnStart.classList.remove('running');
  timerEl.classList.remove('urgent');
  updateDisplay();
  renderSessions();
}

// Events
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => { reset(); setMode(t.dataset.mode); }));
btnStart.addEventListener('click', toggle);
btnReset.addEventListener('click', reset);
btnSettings.addEventListener('click', (e) => {
  e.stopPropagation();
  settingsPanel.classList.toggle('open');
});
document.addEventListener('click', () => settingsPanel.classList.remove('open'));
settingsPanel.addEventListener('click', e => e.stopPropagation());

document.getElementById('applySettings').addEventListener('click', () => {
  settings.pomodoro = parseInt(document.getElementById('setPomo').value) || 25;
  settings.short = parseInt(document.getElementById('setShort').value) || 5;
  settings.long = parseInt(document.getElementById('setLong').value) || 15;
  settingsPanel.classList.remove('open');
  setMode(mode);
});

// Init
setMode('pomodoro');
renderSessions();
</script>
</body>
</html>
